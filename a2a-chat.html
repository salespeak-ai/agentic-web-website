    <style>
        :root {
            --color-sarah: #10B981;
            --color-sarah-dim: rgba(16, 185, 129, 0.10);
            --color-sarah-border: rgba(16, 185, 129, 0.25);
            --color-sarah-glow: rgba(16, 185, 129, 0.35);
            --color-concierge: #1E90FF;
            --color-concierge-dim: rgba(30, 144, 255, 0.10);
            --color-concierge-border: rgba(30, 144, 255, 0.25);
            --color-concierge-glow: rgba(30, 144, 255, 0.35);
            --color-acme: #9333EA;
            --color-acme-dim: rgba(147, 51, 234, 0.10);
            --color-acme-border: rgba(147, 51, 234, 0.25);
            --color-acme-glow: rgba(147, 51, 234, 0.35);

            --bg-primary: #030712;
            --bg-secondary: #0a0f1a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-cyan: #1E90FF;
            --accent-orange: #FF6B35;
            --accent-amber: #F59E0B;

            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nav */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 1rem 0;
            background: rgba(3, 7, 18, 0.88);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 2rem; }
        .nav-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-primary); }
        .nav-brand-text { display: flex; flex-direction: column; }
        .nav-brand-title { font-weight: 700; font-size: 1.25rem; line-height: 1.2; }
        .nav-brand-powered { font-size: 0.625rem; color: var(--text-muted); }
        .nav-brand-powered .salespeak { color: var(--text-secondary); font-weight: 600; }
        .nav-brand-powered .salespeak .s { color: var(--accent-cyan); }
        .nav-brand-powered .salespeak .e { color: var(--accent-orange); }
        .nav-brand-icon { width: 1.5rem; height: 2rem; display: flex; align-items: center; }
        .nav-brand-icon svg { width: 100%; height: 100%; }
        .nav-actions { display: flex; gap: 0.75rem; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; font-size: 0.875rem; font-weight: 500; border-radius: 0.5rem; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent-cyan); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-secondary { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-secondary); }
        .btn-secondary:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
        @media (max-width: 640px) { .nav-actions .btn-secondary { display: none; } }

        /* Chat Container */
        .chat-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 5.5rem 1.5rem 8rem;
        }

        /* Header */
        .chat-header {
            text-align: center;
            padding: 2rem 0 2.5rem;
        }

        .chat-header-label {
            display: inline-block;
            padding: 0.3rem 0.875rem;
            background: linear-gradient(135deg, var(--color-concierge-dim), var(--color-acme-dim));
            border: 1px solid var(--color-concierge-border);
            border-radius: 2rem;
            font-size: 0.6875rem; font-weight: 600;
            color: var(--accent-cyan);
            text-transform: uppercase; letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .chat-header h1 {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700; margin-bottom: 0.75rem;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .chat-header p {
            font-size: 1rem; color: var(--text-secondary); max-width: 520px; margin: 0 auto;
        }

        /* Participants bar */
        .participants {
            display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .participant {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            font-size: 0.75rem;
        }

        .participant-dot {
            width: 0.5rem; height: 0.5rem; border-radius: 50%;
        }
        .participant.sarah .participant-dot { background: var(--color-sarah); }
        .participant.concierge .participant-dot { background: var(--color-concierge); }
        .participant.acme .participant-dot { background: var(--color-acme); }
        .participant-name { font-weight: 600; }
        .participant-role { color: var(--text-muted); }

        /* Chat feed */
        .chat-feed {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Phase divider */
        .phase-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .phase-divider.visible { opacity: 1; transform: translateY(0); }

        .phase-divider::before,
        .phase-divider::after {
            content: '';
            flex: 1; height: 1px;
            background: var(--border-subtle);
        }

        .phase-divider-label {
            font-family: var(--font-mono);
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            white-space: nowrap;
            padding: 0.3rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
        }

        /* Chat message */
        .chat-msg {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 0;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .chat-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chat-msg-avatar {
            width: 2rem; height: 2rem;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6875rem; font-weight: 700; color: white;
            flex-shrink: 0;
            margin-top: 0.2rem;
        }

        .chat-msg.sarah .chat-msg-avatar { background: var(--color-sarah); box-shadow: 0 0 10px var(--color-sarah-glow); }
        .chat-msg.concierge .chat-msg-avatar { background: var(--color-concierge); box-shadow: 0 0 10px var(--color-concierge-glow); }
        .chat-msg.acme .chat-msg-avatar { background: var(--color-acme); box-shadow: 0 0 10px var(--color-acme-glow); }

        .chat-msg-content { flex: 1; min-width: 0; }

        .chat-msg-meta {
            display: flex; align-items: baseline; gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .chat-msg-name {
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .chat-msg.sarah .chat-msg-name { color: var(--color-sarah); }
        .chat-msg.concierge .chat-msg-name { color: var(--color-concierge); }
        .chat-msg.acme .chat-msg-name { color: var(--color-acme); }

        .chat-msg-route {
            font-size: 0.625rem; color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .chat-msg-bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 0 0.875rem 0.875rem 0.875rem;
            padding: 1rem 1.25rem;
            font-size: 0.9375rem;
            line-height: 1.7;
        }

        .chat-msg.sarah .chat-msg-bubble { border-top: 2px solid var(--color-sarah); }
        .chat-msg.concierge .chat-msg-bubble { border-top: 2px solid var(--color-concierge); }
        .chat-msg.acme .chat-msg-bubble { border-top: 2px solid var(--color-acme); }

        .chat-msg-bubble .hl { color: var(--accent-cyan); font-weight: 600; }
        .chat-msg-bubble .hl-green { color: var(--color-sarah); font-weight: 600; }
        .chat-msg-bubble .hl-purple { color: var(--color-acme); font-weight: 600; }
        .chat-msg-bubble .hl-amber { color: var(--accent-amber); font-weight: 600; }

        .chat-msg-tag {
            display: inline-block;
            margin-top: 0.625rem;
            padding: 0.15rem 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.2rem;
            font-family: var(--font-mono);
            font-size: 0.5625rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* System message (searching context etc) */
        .chat-system {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            padding: 0.625rem 0;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .chat-system.visible { opacity: 1; transform: translateY(0); }

        .chat-system-inner {
            display: flex; align-items: center; gap: 0.625rem;
            padding: 0.5rem 1rem;
            border: 1px dashed var(--border-subtle);
            border-radius: 2rem;
            background: rgba(255,255,255,0.02);
        }

        .chat-system .spinner {
            width: 0.875rem; height: 0.875rem;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .chat-system .sys-label {
            font-family: var(--font-mono);
            font-size: 0.6875rem;
            color: var(--text-muted);
        }

        /* Typing indicator */
        .chat-typing {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .chat-typing.visible { opacity: 1; }

        .typing-dots {
            display: flex; align-items: center; gap: 4px;
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 0 0.875rem 0.875rem 0.875rem;
        }

        .typing-dots span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-5px); }
        }

        /* Fixed bottom controls */
        .controls {
            position: fixed;
            bottom: 0; left: 0; right: 0; z-index: 999;
            padding: 1rem 2rem;
            background: linear-gradient(0deg, rgba(3,7,18,0.97) 0%, rgba(3,7,18,0.85) 70%, transparent 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
        }

        .progress-track {
            width: 100%; max-width: 500px; height: 3px;
            background: var(--border-subtle); border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--color-sarah), var(--color-concierge), var(--color-acme));
            border-radius: 2px; transition: width 0.4s ease;
        }

        .controls-row { display: flex; align-items: center; gap: 1rem; }

        .ctrl-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.625rem 1.5rem;
            background: linear-gradient(135deg, rgba(30,144,255,0.12), rgba(147,51,234,0.12));
            border: 1px solid rgba(30,144,255,0.25);
            border-radius: 3rem;
            color: var(--text-primary); font-family: var(--font-sans);
            font-size: 0.8125rem; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease;
        }
        .ctrl-btn:hover { background: linear-gradient(135deg, rgba(30,144,255,0.22), rgba(147,51,234,0.22)); transform: translateY(-1px); }
        .ctrl-btn:disabled { opacity: 0.3; pointer-events: none; }
        .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .step-counter { font-family: var(--font-mono); font-size: 0.625rem; color: var(--text-muted); }

        /* Footer */
        .salespeak-logo { color: var(--text-primary); text-decoration: none; font-weight: 600; }
        .salespeak-logo .s { color: var(--accent-cyan); }
        .salespeak-logo .e { color: var(--accent-orange); }

        @media (max-width: 640px) {
            .chat-wrapper { padding: 5rem 1rem 8rem; }
            .chat-msg-bubble { padding: 0.75rem 1rem; font-size: 0.875rem; }
        }
    </style>

    <script>
    const names = { sarah: 'Sarah', concierge: 'Concierge', acme: 'ACME Pulse' };
    const initials = { sarah: 'S', concierge: 'C', acme: 'A' };

    const messages = [
        // ── Phase 1 ──
        { type: 'phase', label: 'Phase 1 — The Initial Capability Check' },

        { who: 'sarah', to: 'Concierge',
          text: '"Find out if ACME\'s <span class="hl">AttriPulse AI</span> supports multi-touch attribution for LinkedIn offline conversions. Our budget is <span class="hl">$50k/year</span>, and we currently use <span class="hl">HubSpot</span> and <span class="hl">Snowflake</span>. See if they can handle that."' },

        { who: 'concierge', to: 'ACME Pulse', route: 'A2A',
          text: '"Does AttriPulse AI support <span class="hl">multi-touch attribution</span> for LinkedIn offline conversions?"',
          tag: 'Capability Query' },

        { who: 'acme', to: 'Concierge', route: 'Verified',
          text: '"Yes. We offer a native <span class="hl">LinkedIn Lead Gen integration</span> that syncs offline conversion data via our <span class="hl">Snowflake connector</span>."',
          tag: 'Verified Response' },

        { who: 'concierge', to: 'Sarah',
          text: '"ACME confirmed they support <span class="hl">LinkedIn offline conversions</span> through a native <span class="hl">Snowflake sync</span>. The capability is built-in — no custom integration needed."' },

        // ── Phase 2 ──
        { type: 'phase', label: 'Phase 2 — Agent-Level Resolution' },

        { who: 'sarah', to: 'Concierge',
          text: '"That sounds good. Now find out exactly what the <span class="hl">annual cost</span> would be for my team."' },

        { who: 'concierge', to: 'ACME Pulse', route: 'A2A',
          text: '"What is the annual cost for AttriPulse AI for our specific configuration?"',
          tag: 'Pricing Query' },

        { who: 'acme', to: 'Concierge',
          text: '"To provide an accurate quote, I need to know the <span class="hl-amber">annual marketing spend</span> and <span class="hl-amber">required seat count</span>."',
          tag: 'Qualification Request' },

        { type: 'system', label: 'Concierge searching Sarah\'s original context...' },

        { who: 'concierge', to: 'ACME Pulse', route: 'A2A',
          text: '"The annual marketing budget is <span class="hl">$50k/year</span>. We require <span class="hl">5 seats</span>."',
          tag: 'Auto-Resolved from Context' },

        { who: 'acme', to: 'Concierge', route: 'Verified',
          text: '"Based on those parameters, you qualify for the <span class="hl-purple">Pro tier</span> at <span class="hl">$3,200/month</span> (<span class="hl">$38,400/year</span>)."',
          tag: 'Verified Quote' },

        { who: 'concierge', to: 'Sarah',
          text: '"The annual cost is <span class="hl">$38,400</span> for 5 seats on their <span class="hl-purple">Pro tier</span>. This fits within your <span class="hl-green">$50k budget</span>."' },

        // ── Phase 3 ──
        { type: 'phase', label: 'Phase 3 — Human Input Required' },

        { who: 'sarah', to: 'Concierge',
          text: '"Last thing: check if their <span class="hl">predictive modeling</span> works with our HubSpot custom objects. We have a complex setup."' },

        { who: 'concierge', to: 'ACME Pulse', route: 'A2A',
          text: '"Does your predictive modeling support <span class="hl">HubSpot custom objects</span>?"',
          tag: 'Integration Query' },

        { who: 'acme', to: 'Concierge',
          text: '"It does, but only for <span class="hl-amber">Enterprise accounts</span>. Are you on <span class="hl-amber">HubSpot Enterprise</span> or the <span class="hl-amber">Legacy Professional</span> version?"',
          tag: 'Clarification Needed' },

        { type: 'system', label: 'Concierge searching internal context... data not found' },

        { who: 'concierge', to: 'Sarah',
          text: '"ACME needs to know if we are on <span class="hl-amber">HubSpot Enterprise</span> or <span class="hl-amber">Legacy Professional</span> to confirm custom object support. Which one are we using?"' },

        { who: 'sarah', to: 'Concierge',
          text: '"We upgraded to <span class="hl-green">Enterprise</span> last quarter. Tell them we are on the latest version."' },

        { who: 'concierge', to: 'ACME Pulse', route: 'A2A',
          text: '"The client is on <span class="hl">HubSpot Enterprise</span>."',
          tag: 'Human-Verified Data' },

        { who: 'acme', to: 'Concierge', route: 'Verified',
          text: '"Confirmed. <span class="hl-green">Predictive modeling is fully supported.</span> I\'ve sent a technical spec sheet to your secure endpoint."',
          tag: 'Verified &bull; Spec Delivered' },
    ];

    // ── Rendering ──
    const feed = document.getElementById('chatFeed');
    const progressFill = document.getElementById('progressFill');
    const stepCounter = document.getElementById('stepCounter');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const playLabel = document.getElementById('playLabel');

    let currentIndex = -1;
    let isPlaying = false;
    let timer = null;
    let typingEl = null;

    function createMessageEl(msg) {
        if (msg.type === 'phase') {
            const el = document.createElement('div');
            el.className = 'phase-divider';
            el.innerHTML = `<span class="phase-divider-label">${msg.label}</span>`;
            return el;
        }

        if (msg.type === 'system') {
            const el = document.createElement('div');
            el.className = 'chat-system';
            el.innerHTML = `<div class="chat-system-inner"><div class="spinner"></div><span class="sys-label">${msg.label}</span></div>`;
            return el;
        }

        const el = document.createElement('div');
        el.className = `chat-msg ${msg.who}`;

        const routeStr = msg.route ? ` &mdash; ${msg.route}` : '';
        const tagStr = msg.tag ? `<div class="chat-msg-tag">${msg.tag}</div>` : '';

        el.innerHTML = `
            <div class="chat-msg-avatar">${initials[msg.who]}</div>
            <div class="chat-msg-content">
                <div class="chat-msg-meta">
                    <span class="chat-msg-name">${names[msg.who]}</span>
                    <span class="chat-msg-route">to ${msg.to}${routeStr}</span>
                </div>
                <div class="chat-msg-bubble">
                    ${msg.text}
                    ${tagStr}
                </div>
            </div>
        `;
        return el;
    }

    function createTypingEl(who) {
        const el = document.createElement('div');
        el.className = `chat-typing`;
        el.innerHTML = `
            <div class="chat-msg-avatar ${who}" style="width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.6875rem;font-weight:700;color:white;flex-shrink:0;background:var(--color-${who});box-shadow:0 0 10px var(--color-${who}-glow)">${initials[who]}</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
        `;
        return el;
    }

    function getDuration(msg) {
        if (msg.type === 'phase') return 2000;
        if (msg.type === 'system') return 2200;
        const len = (msg.text || '').replace(/<[^>]*>/g, '').length;
        return Math.max(2200, Math.min(len * 28, 5500));
    }

    function getTypingDelay(msg) {
        if (msg.type === 'phase') return 400;
        if (msg.type === 'system') return 800;
        return 1000 + Math.random() * 600;
    }

    function showNext() {
        currentIndex++;
        if (currentIndex >= messages.length) {
            stopPlay();
            return;
        }

        const msg = messages[currentIndex];
        updateProgress();

        // Show typing indicator first for chat messages
        if (!msg.type) {
            typingEl = createTypingEl(msg.who);
            feed.appendChild(typingEl);
            requestAnimationFrame(() => typingEl.classList.add('visible'));
            typingEl.scrollIntoView({ behavior: 'smooth', block: 'end' });

            timer = setTimeout(() => {
                // Remove typing, show message
                if (typingEl) { typingEl.remove(); typingEl = null; }
                const el = createMessageEl(msg);
                feed.appendChild(el);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => el.classList.add('visible'));
                });
                el.scrollIntoView({ behavior: 'smooth', block: 'end' });

                if (isPlaying) {
                    timer = setTimeout(showNext, getDuration(msg));
                }
            }, getTypingDelay(msg));
        } else {
            const el = createMessageEl(msg);
            feed.appendChild(el);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => el.classList.add('visible'));
            });
            el.scrollIntoView({ behavior: 'smooth', block: 'end' });

            if (isPlaying) {
                timer = setTimeout(showNext, getDuration(msg));
            }
        }
    }

    function startPlay() {
        isPlaying = true;
        updatePlayUI();
        if (currentIndex >= messages.length - 1) {
            // Reset
            feed.innerHTML = '';
            currentIndex = -1;
        }
        showNext();
    }

    function stopPlay() {
        isPlaying = false;
        clearTimeout(timer);
        timer = null;
        if (typingEl) { typingEl.remove(); typingEl = null; }
        updatePlayUI();
    }

    function togglePlay() {
        if (isPlaying) stopPlay();
        else startPlay();
    }

    function updatePlayUI() {
        playIcon.style.display = isPlaying ? 'none' : 'block';
        pauseIcon.style.display = isPlaying ? 'block' : 'none';
        playLabel.textContent = isPlaying ? 'Pause' : (currentIndex >= messages.length - 1 ? 'Replay' : 'Play');
    }

    function updateProgress() {
        const pct = ((currentIndex + 1) / messages.length) * 100;
        progressFill.style.width = pct + '%';
        stepCounter.textContent = (currentIndex + 1) + ' / ' + messages.length;
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    });

    // Init
    stepCounter.textContent = '0 / ' + messages.length;
    </script>
</body>
</html>
